<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>내 비서</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      /* 1. 아이폰 노치 대응: 상단 여백 설정 */
      padding-top: calc(constant(safe-area-inset-top) + 10px);
      padding-top: calc(env(safe-area-inset-top) + 10px);
      padding-left: 16px;
      padding-right: 16px;
      padding-bottom: env(safe-area-inset-bottom);
      
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .app-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-around;
    }

    h2 {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .action-card {
      background-color: #1c1c1e;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      justify-content: center;
    }
    
    .action-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #a1a1a6;
    }

    /* 데이터 값 스타일 */
    .data-value {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      color: white;
      cursor: pointer;
    }
    
    button:active { transform: scale(0.97); }

    .btn-fuel { background-color: #ff9500; }
    .btn-robot { background-color: #34c759; }
    .btn-wash { background-color: #007aff; }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      text-align: center;
      border: none;
      border-radius: 12px;
      background-color: #2c2c2e;
      color: #ffffff;
      outline: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2>✨ 내 비서</h2>
    
    <div class="action-card">
      <h3>🚗 이달의 주유</h3>
      <div class="data-value" id="fuel-data">...</div>
      <button class="btn-fuel" onclick="runAction('addFuel')">주유 기록</button>
    </div>

    <div class="action-card">
      <h3>🤖 로청이 현황</h3>
      <div class="data-value" id="robot-data">...</div>
      <button class="btn-robot" onclick="runAction('addRobot')">청소 시작</button>
    </div>

    <div class="action-card">
      <h3>🫧 세차 잔액</h3>
      <div class="data-value" id="wash-data">...</div>
      <div class="input-group">
        <input type="number" id="washAmount" placeholder="차감 금액 (예: 6000)">
        <button class="btn-wash" onclick="runCarWash()">잔액 차감</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwfQbj7RGq3h9wLsLM1FJVwVPiolWHbst1KFeZzXoyV8rv3RxKXdVe8VQOXamrtu39AGA/exec';

    // 화면 로딩 시 현재 상태 불러오기
    window.onload = function() {
      fetch(GAS_URL + '?action=getData')
        .then(response => response.json())
        .then(res => {
          if(res.status === 'success') {
            document.getElementById('fuel-data').innerText = `${res.data.fuel} / 3회`;
            document.getElementById('robot-data').innerText = `${res.data.robot}회`;
            // 숫자에 콤마를 찍어 가독성 향상
            document.getElementById('wash-data').innerText = `${res.data.carWash.toLocaleString()}원`; 
          }
        })
        .catch(err => {
            document.getElementById('fuel-data').innerText = "오류";
            document.getElementById('robot-data').innerText = "오류";
            document.getElementById('wash-data').innerText = "오류";
        });
    };

    function runAction(action) {
      // 로딩 중 표시
      if(action === 'addFuel') document.getElementById('fuel-data').innerText = "...";
      if(action === 'addRobot') document.getElementById('robot-data').innerText = "...";
      
      fetch(`${GAS_URL}?action=${action}`)
        .then(response => response.json())
        .then(res => {
          alert(res.message);
          window.location.reload(); 
        });
    }

    function runCarWash() {
      const amount = document.getElementById('washAmount').value;
      if (!amount) return alert('차감할 금액을 입력하세요.');
      
      document.getElementById('wash-data').innerText = "...";
      
      fetch(`${GAS_URL}?action=useCarWash&amount=${amount}`)
        .then(response => response.json())
        .then(res => {
          alert(res.message);
          window.location.reload(); 
        });
    }
  </script>

</body>
</html>
