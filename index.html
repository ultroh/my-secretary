<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>내 비서</title>

<style>
:root {
  --bg:#121212; --card:#1e1e1e;
  --fuel:#FF9800; --robot:#4CAF50; --primary:#4A90E2;
  --hair:#af52de; --todo:#ff5e57; --text:#fff;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:sans-serif;}

.app{max-width:480px;margin:auto;height:100vh;padding:10px;display:flex;flex-direction:column;}

#dashboard{
  flex:1;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:10px;
}

.card{
  background:var(--card);
  border-radius:16px;
  padding:10px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  text-align:center;
}

button{border:none;border-radius:10px;padding:10px;color:#fff;}
.btn-fuel{background:var(--fuel);}
.btn-robot{background:var(--robot);}
.btn-car{background:var(--primary);}
.btn-hair{background:var(--hair);}
.btn-todo{background:var(--todo);}

#todo-list{
  margin-top:8px;
  max-height:100px;
  overflow:auto;
  font-size:12px;
}
</style>
</head>

<body>
<div class="app">

<div id="dashboard">

<!-- 1 -->
<div class="card">
<div>🚗 주유</div>
<div id="fuel-status"></div>
<button class="btn-fuel" onclick="recordAction('addFuel')">기록</button>
</div>

<!-- 2 -->
<div class="card">
<div>🤖 로봇</div>
<div id="robot-status"></div>
<button class="btn-robot" onclick="recordAction('addRobot')">기록</button>
</div>

<!-- 3 -->
<div class="card">
<div>🫧 세차</div>
<div id="carwash-status"></div>
<input id="wash" type="number" placeholder="금액">
<button class="btn-car" onclick="useCarWash()">차감</button>
</div>

<!-- 4 -->
<div class="card">
<div>✂️ Hair</div>
<input type="date" id="hairDate" onchange="setHair()">
</div>

<!-- 5 ✅ ToDo -->
<div class="card">
<div>📝 ToDo</div>

<input id="todo-input" placeholder="할 일 입력">
<button class="btn-todo" onclick="addTodo()">추가</button>

<div id="todo-list"></div>
</div>

<!-- 6 -->
<div class="card">
<div>📰 뉴스</div>
<button onclick="alert('뉴스 연결 예정')">보기</button>
</div>

</div>
</div>

<script>
const URL='여기에_GAS_URL';

// ===== 기본 =====
function load(){
fetch(URL+'?action=getData')
.then(r=>r.json())
.then(d=>{
document.getElementById('fuel-status').innerText=d.data.fuel+'/3';
document.getElementById('robot-status').innerText=d.data.robot+'/2';
document.getElementById('carwash-status').innerText=d.data.carWash;
});
loadTodo();
}

// ===== 기존 =====
function recordAction(a){
fetch(URL+'?action='+a).then(load);
}

function useCarWash(){
const v=document.getElementById('wash').value;
fetch(URL+'?action=useCarWash&amount='+v).then(load);
}

function setHair(){
const d=document.getElementById('hairDate').value;
fetch(URL+'?action=setHairCut&dateVal='+d);
}

// ===== ToDo =====
function loadTodo(){
fetch(URL+'?action=getTodo')
.then(r=>r.json())
.then(res=>{
const el=document.getElementById('todo-list');
el.innerHTML='';

res.data.forEach(i=>{
const div=document.createElement('div');

div.innerHTML=`
<span style="${i.done?'text-decoration:line-through':''}">
${i.text}
</span>
<button onclick="toggleTodo('${i.id}')">
${i.done?'↩':'✔'}
</button>
<button onclick="deleteTodo('${i.id}')">❌</button>
`;

el.appendChild(div);
});
});
}

function addTodo(){
const t=document.getElementById('todo-input').value;
fetch(URL+'?action=addTodo&text='+encodeURIComponent(t))
.then(()=>{document.getElementById('todo-input').value='';loadTodo();});
}

function toggleTodo(id){
fetch(URL+'?action=toggleTodo&id='+id).then(loadTodo);
}

function deleteTodo(id){
fetch(URL+'?action=deleteTodo&id='+id).then(loadTodo);
}

window.onload=load;
</script>

</body>
</html>
