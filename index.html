<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Log</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
:root {
  --bg-color: #121212;
  --card-bg: #1e1e1e;
  --primary: #4A90E2;
  --fuel-color: #FF9800;
  --robot-color: #4CAF50;
  --hair-color: #af52de;
  --text-main: #ffffff;
  --text-muted: #aaaaaa;
  --hyundai-blue: #002c5f;
  --mini-red: #e20112;
}

* { box-sizing: border-box; margin:0; padding:0; }

body, html {
  width:100%;
  background-color: var(--bg-color);
  font-family: 'Pretendard', sans-serif;
  overscroll-behavior-y: contain;
  overflow-x: hidden;
}

.app-container {
  max-width:480px;
  margin:auto;
  min-height: 100dvh;
  padding: 8px 12px 40px;
  display:flex;
  flex-direction:column;
  position: relative;
}

#pull-indicator {
  position: absolute;
  top: 0; left: 0; width: 100%;
  height: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-color);
  color: var(--primary);
  font-size: 13px;
  font-weight: bold;
  z-index: 100;
}

h2 { color:white; text-align:center; margin: 8px 0 12px; font-size: 1.2rem; }

#dashboard {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: auto;
  gap: 10px;
}

.card {
  background: var(--card-bg);
  border-radius:14px;
  padding: 12px;
  display:flex;
  flex-direction:column;
  justify-content: space-between; /* 상하 끝 정렬 */
  align-items:center;
  text-align: center;
}

/* 하단 4개 소형 카드 높이 고정 */
.stat-card {
  height: 140px; 
}

.card-title { font-size:13px; color: var(--text-muted); margin-bottom: 4px; }

.status-value {
  font-size:18px;
  font-weight:900;
  color:white;
  line-height: 1.2;
  flex: 1; /* 중앙 영역 차지 */
  display: flex;
  align-items: center;
  justify-content: center;
}

.small-info { font-size: 11px; color: #888; display: block; }

input, button {
  width:100%;
  border:none;
  border-radius:8px;
  padding: 10px;
  margin-top: 6px;
  transition: all 0.2s;
  font-size: 13px;
}

input { background: #2a2a2a; color: white; text-align: center; }

/* 세차 잔액 입력창 특화 수정 */
#wash-amount {
  padding: 6px; /* 높이 축소 */
  margin-top: 4px;
  margin-bottom: 2px;
  font-size: 12px;
}

button { font-weight:800; color:white; cursor:pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-fuel { background: var(--fuel-color); }
.btn-robot { background: var(--robot-color); }
.btn-carwash { background: var(--primary); }
.btn-hair { background: var(--hair-color); }

.reminder-card {
  grid-column: span 2;
  justify-content: flex-start;
  min-height: 160px;
}

.car-rotation-card {
  grid-column: span 2;
  padding: 10px 14px;
}

.car-btn-container {
  display: flex;
  width: 100%;
  gap: 8px;
  margin-top: 6px;
}

.car-mark {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  font-weight: 900;
  font-size: 13px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.hyundai-on { background-color: var(--hyundai-blue); color: white; border: 1px solid #1a4a8a; }
.mini-on { background-color: var(--mini-red); color: white; border: 1px solid #ff4d4d; }
.car-off { background-color: #2a2a2a; color: #555; opacity: 0.5; }

.todo-input-group {
  display: flex;
  width: 100%;
  gap: 6px;
  margin-top: 6px;
}

.todo-input-group input { flex: 1; margin-top: 0; padding: 8px; }
.todo-input-group button { width: auto; min-width: 55px; margin-top: 0; padding: 8px 12px; background-color: var(--primary); }
  
.todo-list {
  margin-top: 8px;
  max-height: 140px;
  overflow-y: auto;
  width: 100%;
}

.todo-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2a2a2a;
  padding: 8px 10px;
  border-radius:8px;
  margin-bottom:6px;
  gap: 8px;
}

.drag-handle { color: #666; cursor: grab; font-size: 14px; }

.todo-item span.text { 
  flex:1; 
  text-align:left; 
  color: white; 
  font-size: 12px; 
  white-space: nowrap; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}

.todo-item button {
  width:auto;
  min-width: 40px;
  padding: 4px 8px;
  margin-top: 0;
  font-size: 10px;
  background:#ff5252;
}
</style>
</head>

<body>
<div class="app-container" id="main-container">
  <div id="pull-indicator">아래로 당겨서 새로고침</div>
  
  <h2>✨ My Log 🌸</h2>

  <div id="dashboard">
    <div class="card reminder-card">
      <div class="card-title" style="margin-bottom:0;">📌 리마인더</div>
      <div class="todo-input-group">
        <input type="text" id="todo-input" placeholder="메모 입력">
        <button id="btn-add-todo" onclick="addTodo(this)">추가</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>

    <div class="card car-rotation-card">
      <div class="card-title">🚙 2부제: 오늘 운행 차량</div>
      <div class="car-btn-container">
        <div id="mark-hyundai" class="car-mark">HYUNDAI</div>
        <div id="mark-mini" class="car-mark">MINI</div>
      </div>
    </div>

    <div class="card stat-card">
      <div class="card-title">🚗 이달의 주유</div>
      <div class="status-value" id="fuel-status">- / 3회</div>
      <button class="btn-fuel" onclick="recordAction('addFuel', this, '주유 기록')">주유 기록</button>
    </div>

    <div class="card stat-card">
      <div class="card-title">🤖 로청이</div>
      <div class="status-value" id="robot-status">- / 2회</div>
      <button class="btn-robot" onclick="recordAction('addRobot', this, '청소 기록')">청소 기록</button>
    </div>

    <div class="card stat-card">
      <div class="card-title">🫧 세차 잔액</div>
      <div class="status-value" id="carwash-status" style="flex:none; margin: 5px 0;">-원</div>
      <input type="number" id="wash-amount" placeholder="금액">
      <button class="btn-carwash" onclick="recordCarWash(this)">차감</button>
    </div>

    <div class="card stat-card">
      <div class="card-title">✂️ 머리한 날</div>
      <div class="status-value" id="hair-status">-</div>
      <div style="position: relative; width: 100%; margin-top: 6px;">
        <button class="btn-hair" id="btn-hair" style="width: 100%; pointer-events: none;">날짜선택</button>
        <input type="date" id="hairDateVal" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;" onchange="recordHairCut(document.getElementById('btn-hair'))">
      </div>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgRQ_fvLToFTWS2IWrJJSf29uBqUzYBbBWpcFyTt8gsk5dDwLMGcHtgx1DZHNifKBfEA/exec'; 

// --- Pull to Refresh 로직 ---
let startY = 0;
let pullDist = 0;
const threshold = 70;
const pullIndicator = document.getElementById('pull-indicator');
const container = document.getElementById('main-container');

window.addEventListener('touchstart', (e) => {
  if (window.scrollY === 0) startY = e.touches[0].pageY;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  const currentY = e.touches[0].pageY;
  pullDist = currentY - startY;
  if (pullDist > 0 && window.scrollY === 0) {
    const displayHeight = Math.min(pullDist * 0.4, threshold + 20);
    pullIndicator.style.height = displayHeight + 'px';
    pullIndicator.innerText = displayHeight > threshold ? '놓아서 새로고침' : '아래로 당겨서 새로고침';
  }
}, { passive: true });

window.addEventListener('touchend', () => {
  if (window.scrollY === 0 && pullDist * 0.4 > threshold) {
    pullIndicator.innerText = '업데이트 중...';
    loadAll();
    setTimeout(() => { pullIndicator.style.height = '0px'; }, 800);
  } else {
    pullIndicator.style.height = '0px';
  }
  pullDist = 0;
});

function loadAll() {
  loadData();
  loadTodos();
  updateCarRotation();
}

function updateCarRotation() {
  const today = new Date().getDate();
  const hyundai = document.getElementById('mark-hyundai');
  const mini = document.getElementById('mark-mini');
  hyundai.className = 'car-mark';
  mini.className = 'car-mark';
  if (today % 2 === 0) {
    hyundai.classList.add('hyundai-on'); mini.classList.add('car-off');
  } else {
    mini.classList.add('mini-on'); hyundai.classList.add('car-off');
  }
}

function toggleLoading(btn, isLoading, originalText) {
  btn.disabled = isLoading;
  btn.innerText = isLoading ? '...' : originalText;
}

function getHaircutStatus(dateStr) {
  if (!dateStr) return "기록 없음";
  const cleanDateStr = dateStr.replace(/[.\s]+/g, '-').replace(/-$/, '');
  const targetDate = new Date(cleanDateStr);
  const today = new Date(); today.setHours(0,0,0,0); targetDate.setHours(0,0,0,0);
  const diffDays = Math.floor((today - targetDate) / (1000 * 60 * 60 * 24));
  return `D+${diffDays}<br><span class="small-info">(${Math.floor(diffDays/7)+1}주차)</span>`;
}

function loadData() {
  fetch(`${GAS_URL}?action=getData&_t=${Date.now()}`)
  .then(res => res.json())
  .then(res => {
    if(res.status === 'success') {
      const d = res.data;
      document.getElementById('fuel-status').innerText = d.fuel + " / 3회";
      document.getElementById('robot-status').innerText = d.robot + " / 2회";
      document.getElementById('carwash-status').innerText = (d.carWash || 0).toLocaleString() + "원";
      document.getElementById('hair-status').innerHTML = getHaircutStatus(d.hairCutDate);
    }
  });
}

function recordHairCut(btn){
  const v = document.getElementById('hairDateVal').value;
  if(!v) return;
  toggleLoading(btn, true, '날짜선택');
  fetch(`${GAS_URL}?action=setHairCut&dateVal=${v}`)
  .then(() => { toggleLoading(btn, false, '날짜선택'); loadData(); });
}

function recordAction(action, btn, originalText){
  toggleLoading(btn, true, originalText);
  fetch(`${GAS_URL}?action=${action}`).then(res => res.json()).then(data => {
    toggleLoading(btn, false, originalText);
    if(data.message) alert(data.message);
    loadData();
  });
}

function recordCarWash(btn){
  const v = document.getElementById('wash-amount').value;
  if (!v) return;
  toggleLoading(btn, true, '차감');
  fetch(`${GAS_URL}?action=useCarWash&amount=${v}`).then(() => {
    toggleLoading(btn, false, '차감');
    document.getElementById('wash-amount').value = '';
    loadData();
  });
}

function loadTodos(){
  fetch(`${GAS_URL}?action=getTodos&_t=${Date.now()}`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    const reversedTodos = [...data.todos].map((text, i) => ({ text, originalIndex: i })).reverse();
    reversedTodos.forEach((todo) => {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.dataset.text = todo.text;
      div.innerHTML = `<span class="drag-handle">☰</span><span class="text">${todo.text}</span><button onclick="deleteTodo(${todo.originalIndex}, this)">삭제</button>`;
      list.appendChild(div);
    });
    new Sortable(list, { handle: '.drag-handle', animation: 150, onEnd: saveOrder });
  });
}

function saveOrder() {
  const listItems = document.querySelectorAll('.todo-item');
  const newOrder = Array.from(listItems).map(item => item.dataset.text).reverse(); 
  const encodedData = encodeURIComponent(JSON.stringify(newOrder));
  fetch(`${GAS_URL}?action=updateTodoOrder&data=${encodedData}`);
}

function addTodo(btn){
  const v = document.getElementById('todo-input').value;
  if(!v) return;
  toggleLoading(btn, true, '추가');
  fetch(`${GAS_URL}?action=addTodo&text=${encodeURIComponent(v)}`)
  .then(() => {
    toggleLoading(btn, false, '추가');
    document.getElementById('todo-input').value = '';
    loadTodos();
  });
}

function deleteTodo(index, btn){
  btn.disabled = true;
  btn.innerText = '...';
  fetch(`${GAS_URL}?action=deleteTodo&index=${index}`).then(() => loadTodos());
}

window.onload = loadAll;
</script>

</body>
</html>
