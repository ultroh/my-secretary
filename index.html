<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Archive</title>

<link rel="apple-touch-icon" href="images/apple-touch-icon(big2).png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Log It">

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
:root {
  --card-bg: #ffffff;
  --text-main: #1a1a1a;
  --text-muted: #666666;
  --line-color: #e0e0e0;
  --hyundai-blue: #002c5f;
  --mini-red: #C8102E; 

  --dynamic-app-bg: #002147;
  --dynamic-memo-bg: #ffffff;
  --dynamic-btn-main: #002147;
  --dynamic-btn-sub: #888888;
  --dynamic-border: #C8102E;
  --dynamic-text-color: #ffffff; 
}

* { box-sizing: border-box; margin:0; padding:0; }

body, html {
  width:100%;
  background-color: var(--dynamic-app-bg);
  background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
  background-size: 24px 24px;
  font-family: 'Pretendard', -apple-system, sans-serif;
  transition: background-color 0.8s ease;
  overscroll-behavior-y: auto; 
}

.app-container {
  max-width:480px;
  margin:auto;
  min-height: 100dvh;
  padding: calc(20px + env(safe-area-inset-top)) 12px calc(50px + env(safe-area-inset-bottom));
  display:flex;
  flex-direction:column;
  position: relative;
}

h2 { 
  color: var(--dynamic-text-color); 
  text-align:center; margin: 12px 0; font-size: 1.2rem; font-weight: 900; 
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer; 
  transition: transform 0.1s ease-in-out, color 0.8s ease; user-select: none;
}
h2:active { transform: scale(0.95); }

.rainbow-theme {
  background: linear-gradient(to right, #FF3B30 0%, #FF3B30 14.28%, #FF9500 14.28%, #FF9500 28.57%, #FFCC00 28.57%, #FFCC00 42.85%, #4CD964 42.85%, #4CD964 57.14%, #5AC8FA 57.14%, #5AC8FA 71.42%, #007AFF 71.42%, #007AFF 85.71%, #5856D6 85.71%, #5856D6 100%, #ffffff 100%, #ffffff 200%);
  background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; animation: sweepRainbow 2s ease-in-out forwards;
}
@keyframes sweepRainbow { 0% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

#dashboard { display:grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }

.card {
  background: var(--card-bg); border-radius: 12px; padding: 12px;
  display:flex; flex-direction:column; justify-content: space-between; align-items:center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-top: 6px solid var(--dynamic-border); transition: border-top 0.8s ease, background-color 0.8s ease;
}

.reminder-card { grid-column: span 2; border-top: 6px solid var(--dynamic-border); background-color: var(--dynamic-memo-bg); }
.stat-card { height: 135px; overflow: hidden; }
.card-title { font-size: 11px; font-weight: 800; color: var(--dynamic-btn-main); margin-bottom: 4px; transition: color 0.8s ease; }

.status-value { 
  color: var(--text-main); flex: 1; display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center; padding-top: 6px; 
}
.status-main { font-size: 18px; font-weight: 900; line-height: 1; display: block; }
.status-sub { font-size: 11px; color: #888; font-weight: 600; line-height: 1; margin-top: 4px; display: block; }

input, button { border:none; border-radius:6px; outline: none; }
input { width:100%; background: #f0f0f0; border: 1px solid var(--line-color); color: var(--text-main); padding: 10px; margin-top: 6px; font-size: 13px; text-align: center; }
button { font-weight:800; color:white; cursor:pointer; }

.btn-carwash, .btn-hair, .btn-fuel, .btn-robot {
  width: 100%; height: 36px; margin-top: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px;
  background-color: var(--dynamic-btn-main); transition: background-color 0.8s ease, border-color 0.8s ease, color 0.8s ease;
}
.btn-carwash, .btn-hair { border: 1.5px solid transparent; }
.btn-fuel, .btn-robot { color: #fff; border: 1.5px solid var(--dynamic-btn-main); position: relative; overflow: hidden; background-repeat: no-repeat; }

/* 추가/삭제 애니메이션 효과 */
.loading-add { background-color: transparent !important; color: var(--dynamic-btn-main) !important; background-image: linear-gradient(var(--dynamic-btn-main), var(--dynamic-btn-main)) !important; background-size: 0% 100% !important; animation: fillAdd 1.2s forwards ease-in-out !important; }
@keyframes fillAdd { 0% { background-size: 0% 100%; color: var(--dynamic-btn-main); } 80% { background-size: 100% 100%; color: #fff; } 100% { background-size: 100% 100%; color: #fff; background-color: var(--dynamic-btn-main); } }
.loading-del { background-color: transparent !important; color: var(--dynamic-btn-sub) !important; background-image: linear-gradient(var(--dynamic-btn-sub), var(--dynamic-btn-sub)) !important; background-size: 0% 100% !important; animation: fillDel 1.2s forwards ease-in-out !important; }
@keyframes fillDel { 0% { background-size: 0% 100%; color: var(--dynamic-btn-sub); } 80% { background-size: 100% 100%; color: #fff; } 100% { background-size: 100% 100%; color: #fff; background-color: var(--dynamic-btn-sub); } }
.loading { background-color: transparent !important; color: var(--dynamic-btn-main) !important; background-image: linear-gradient(var(--dynamic-btn-main), var(--dynamic-btn-main)) !important; background-size: 0% 100% !important; animation: fillAdd 1.2s forwards ease-in-out !important; }

.todo-input-group { display: flex; width: 100%; gap: 6px; margin-top: 6px; align-items: center; }
.todo-list { margin-top: 6px; max-height: 105px; overflow-y: auto; width: 100%; }

/* 🔥 수정: 리스트 간격 조정 (padding 2px -> 3px) */
.todo-item { 
  display:flex; justify-content:space-between; align-items:center; 
  padding: 4px 0px; 
  border-bottom: 1px solid var(--line-color); 
  border-radius: 8px; transition: background-color 0.3s ease; 
  -webkit-tap-highlight-color: transparent; user-select: none;
}
.todo-item.highlighted span.text, .todo-item.highlighted .drag-handle { color: #FF9500 !important; font-weight: 800 !important; }

/* 🔥 수정: 내부 텍스트 패딩 조정 (2px -> 3px) */
.todo-item span.text { 
  flex:1; text-align:left; color: var(--text-main); font-size: 13px; 
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
  cursor: pointer; line-height: 1.2; transition: color 0.2s ease;
  padding: 4px 0; 
}

.todo-item.expanded span.text { 
  white-space: normal !important; 
  overflow: visible !important; 
  text-overflow: clip !important;
}

.todo-input-group button, .todo-item button { width: 44px; height: 26px; display: flex; align-items: center; justify-content: center; margin: 0; font-size: 11px; font-weight: 800; border-radius: 6px; flex-shrink: 0; position: relative; overflow: hidden; background-repeat: no-repeat; transition: background-color 0.8s ease, border-color 0.8s ease; }
.todo-input-group button { background-color: var(--dynamic-btn-main); border: 1.5px solid var(--dynamic-btn-main); }
.todo-item button { background-color: var(--dynamic-btn-sub); border: 1.5px solid var(--dynamic-btn-sub); }

.drag-handle { color: #ccc; cursor: grab; padding-right: 8px; font-size: 14px; user-select: none; transition: color 0.2s ease; padding: 3px 12px 3px 0; }

.car-rotation-wrapper { grid-column: span 2; display: flex; flex-direction: column; }
.car-rotation-title { font-size: 11px; font-weight: 800; color: var(--dynamic-text-color); margin-bottom: 6px; letter-spacing: 0.5px; opacity: 0.9; text-align: center; }
.car-btn-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; }
.car-mark { 
  background: var(--card-bg); border-radius: 12px; padding: 16px 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); border-top: 6px solid var(--dynamic-border) !important;
  font-weight: 900; font-size: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; z-index: 1; transition: background-color 0.5s ease-in-out, color 0.5s ease-in-out; 
}
.hyundai-on { background-color: var(--hyundai-blue) !important; color: white !important; }
.mini-on { background-color: var(--mini-red) !important; color: white !important; }
.car-off { background-color: var(--card-bg) !important; color: #bbb !important; opacity: 1 !important; } 

.car-mark.is-sparkling::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(124deg, #ff9a9e 0%, #fecfef 25%, #f6e58d 50%, #a1c4fd 75%, #e0c3fc 100%); background-size: 300% 300%; opacity: 1; animation: dreamySparkle 1.5s ease-in-out infinite alternate; }
@keyframes dreamySparkle { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
</style>

<script>
function applyTimeBasedThemeFixed() {
  const hour = new Date().getHours();
  const root = document.documentElement;
  let s;
  if (hour >= 6 && hour < 14) s = { bg: '#002147', border: '#C8102E', sub: '#6B7A8F' };
  else if (hour >= 14 && hour < 22) s = { bg: '#F0F1F2', border: '#A63333', sub: '#6B7A8F' };
  else s = { bg: '#458C98', border: '#A7292D', sub: '#80B5BE' };
  
  root.style.setProperty('--dynamic-app-bg', s.bg);
  if (s.bg === '#F0F1F2') {
    root.style.setProperty('--dynamic-text-color', '#2C3E50');
    root.style.setProperty('--dynamic-btn-main', '#2C3E50'); 
  } else {
    root.style.setProperty('--dynamic-text-color', '#ffffff');
    root.style.setProperty('--dynamic-btn-main', s.bg);
  }
  root.style.setProperty('--dynamic-border', s.border);
  root.style.setProperty('--dynamic-memo-bg', '#ffffff');
  root.style.setProperty('--dynamic-btn-sub', s.sub); 
}
applyTimeBasedThemeFixed();
</script>
</head>

<body>
<div class="app-container">
  <h2 id="log-it-title" onclick="toggleMedication()">LOG IT</h2>
  <div id="dashboard">
    <div class="card reminder-card">
      <div class="card-title">📌 REMINDERS</div>
      <div class="todo-input-group">
        <input type="text" id="todo-input" placeholder="아이디어를 기록하세요.">
        <button id="btn-add-todo" onclick="addTodo(this)">추가</button>
      </div>
      <div id="todo-list" class="todo-list"></div>
    </div>
    <div class="car-rotation-wrapper">
      <div class="car-rotation-title">🚦 TODAY'S DRIVE</div>
      <div class="car-btn-container">
        <div id="mark-hyundai" class="car-mark car-off" onclick="handleCarSelect(this, 'hyundai')"><span class="btn-text">HYUNDAI</span></div>
        <div id="mark-mini" class="car-mark car-off" onclick="handleCarSelect(this, 'mini')"><span class="btn-text">JCW</span></div>
      </div>
    </div>
    <div class="card stat-card"><div class="card-title">🤖 ROBOT</div><div class="status-value" id="robot-status"></div><button class="btn-robot" onclick="recordAction('addRobot', this)">청소 기록</button></div>
    <div class="card stat-card"><div class="card-title">✂️ HAIR CUT</div><div class="status-value" id="hair-status"></div>
      <div style="position: relative; width: 100%; margin-top: 6px; height: 36px;"><button class="btn-hair" id="btn-hair" style="width: 100%; height: 100%; position: absolute; top: 0; left: 0; pointer-events: none;">날짜선택</button><input type="date" id="hairDateVal" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;" onchange="recordHairCut()"></div>
    </div>
    <div class="card stat-card"><div class="card-title">🫧 CAR WASH</div><div class="status-value" id="carwash-status"></div><button class="btn-carwash" onclick="recordCarWash(this)">차감</button></div>
    <div class="card stat-card"><div class="card-title">🚗 FUEL</div><div class="status-value" id="fuel-status"></div><button class="btn-fuel" onclick="recordAction('addFuel', this)">주유 기록</button></div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzLWAe2d1nzDkIHC0sofc17vqREcy3hQxHewu0dTkhSlDAYYICv-twP1RiDwFux5xiinA/exec'; 

function loadAll() { loadData(); loadTodos(); resetCarButtons(); }

function toggleMedication() {
  const titleEl = document.getElementById('log-it-title');
  const nextState = !titleEl.classList.contains('rainbow-theme');
  titleEl.classList.toggle('rainbow-theme');
  fetch(`${GAS_URL}?action=toggleMedication&state=${nextState}`).then(() => loadData());
}

function loadData() {
  fetch(`${GAS_URL}?action=getData&_t=${Date.now()}`).then(res => res.json()).then(res => {
    if(res.status === 'success') {
      const d = res.data;
      const titleEl = document.getElementById('log-it-title');
      if (d.isMedicationTaken) titleEl.classList.add('rainbow-theme');
      else titleEl.classList.remove('rainbow-theme');

      document.getElementById('fuel-status').innerHTML = `<span class="status-main">${d.fuel} / 3회</span>`;
      const rDate = d.robotDate ? d.robotDate.substring(5).replace('-','/') : "날짜";
      document.getElementById('robot-status').innerHTML = `<span class="status-main">${d.robot} / 2회</span><span class="status-sub">(${rDate})</span>`;
      document.getElementById('carwash-status').innerHTML = `<span class="status-main">${(d.carWash || 0).toLocaleString()}원</span>`;
      document.getElementById('hair-status').innerHTML = getHaircutStatus(d.hairCutDate);
    }
  });
}

function loadTodos(){
  fetch(`${GAS_URL}?action=getTodos&_t=${Date.now()}`).then(res => res.json()).then(res => {
    const list = document.getElementById('todo-list'); list.innerHTML = '';
    const todos = res.todos.list;
    const highlighted = res.todos.highlighted;
    
    [...todos].reverse().forEach((text, i) => {
      const div = document.createElement('div');
      div.className = 'todo-item' + (highlighted.includes(text) ? ' highlighted' : '');
      div.innerHTML = `<span class="drag-handle">☰</span><span class="text">${text}</span><button onclick="deleteTodo(${todos.length - 1 - i}, this)">삭제</button>`;
      
      const handle = div.querySelector('.drag-handle');
      handle.onclick = (e) => {
        e.stopPropagation();
        div.classList.toggle('highlighted');
        if(navigator.vibrate) navigator.vibrate(50);
        fetch(`${GAS_URL}?action=toggleHighlight&text=${encodeURIComponent(text)}`);
      };

      const textField = div.querySelector('.text');
      textField.onclick = (e) => {
        e.stopPropagation();
        div.classList.toggle('expanded');
      };

      list.appendChild(div);
    });
    new Sortable(list, { handle: '.drag-handle', animation: 150, onEnd: saveOrder });
  });
}

function resetCarButtons() { document.getElementById('mark-hyundai').className = 'car-mark car-off'; document.getElementById('mark-mini').className = 'car-mark car-off'; }

function handleCarSelect(el, type) { 
  el.classList.add('is-sparkling');
  setTimeout(() => {
    el.classList.remove('is-sparkling');
    const allowed = (new Date().getDate() % 2 === 0) ? 'hyundai' : 'mini';
    if (type === allowed) {
      el.className = `car-mark ${type}-on`;
      document.getElementById(type === 'hyundai' ? 'mark-mini' : 'mark-hyundai').className = 'car-mark car-off';
    } else { 
      el.className = 'car-mark car-off'; 
    }
  }, 2000);
}

function recordAction(action, btn){ 
  btn.disabled = true; 
  btn.classList.add('loading');
  fetch(`${GAS_URL}?action=${action}`).then(res => res.json()).then(data => {
    btn.disabled = false;
    btn.classList.remove('loading');
    if(data.message) alert(data.message); 
    loadData(); 
  }); 
}

function recordHairCut(){ const v = document.getElementById('hairDateVal').value; if(!v) return; fetch(`${GAS_URL}?action=setHairCut&dateVal=${v}`).then(() => loadData()); }
function recordCarWash(){ const a = prompt("차감할 금액:"); if (a) fetch(`${GAS_URL}?action=useCarWash&amount=${a.replace(/[^0-9]/g, '')}`).then(() => loadData()); }

function addTodo(btn){ 
  const v = document.getElementById('todo-input').value; 
  if(!v) return; 
  btn.disabled=true; 
  btn.classList.add('loading-add');
  fetch(`${GAS_URL}?action=addTodo&text=${encodeURIComponent(v)}`).then(() => { 
    btn.disabled=false; 
    btn.classList.remove('loading-add'); 
    document.getElementById('todo-input').value=''; 
    loadTodos(); 
  }); 
}

function deleteTodo(idx, btn){ 
  btn.disabled=true; 
  btn.classList.add('loading-del');
  fetch(`${GAS_URL}?action=deleteTodo&index=${idx}`).then(() => loadTodos()); 
}

function saveOrder() { 
  const items = Array.from(document.querySelectorAll('.todo-item span.text')).map(s => s.innerText).reverse();
  fetch(`${GAS_URL}?action=updateTodoOrder&data=${encodeURIComponent(JSON.stringify(items))}`);
}

function getHaircutStatus(dStr) {
  if (!dStr) return `<span class="status-main">기록 없음</span>`;
  const diff = Math.floor((new Date() - new Date(dStr.replace(/[.\s]+/g, '-'))) / 86400000);
  return `<span class="status-main">D+${diff}</span><span class="status-sub">(${Math.floor(diff/7)+1}주차)</span>`;
}
window.onload = loadAll;
</script>
</body>
</html>
