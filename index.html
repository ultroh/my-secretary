<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>내 비서</title>

<style>
:root {
  --bg-color: #121212;
  --card-bg: #1e1e1e;
  --primary: #4A90E2;
  --fuel-color: #FF9800;
  --robot-color: #4CAF50;
  --hair-color: #af52de;
  --text-main: #ffffff;
  --text-muted: #aaaaaa;
}

* { box-sizing: border-box; margin:0; padding:0; }

body, html {
  width:100%; height:100%;
  background-color: var(--bg-color);
  font-family: 'Pretendard', sans-serif;
}

.app-container {
  max-width:480px;
  margin:auto;
  height:100dvh;
  padding:10px 16px;
  display:flex;
  flex-direction:column;
}

h2 {
  color:white;
  text-align:center;
  margin:5px 0 10px;
}

/* 🔥 2x3 grid */
#dashboard {
  flex:1;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  grid-template-rows: auto auto 1fr;
  gap:12px;
}

.card {
  background: var(--card-bg);
  border-radius:16px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
}

.card-title {
  font-size:14px;
  color: var(--text-muted);
}

.status-value {
  font-size:22px;
  font-weight:900;
  color:white;
}

.sub-text { color:#ccc; font-size:13px; }

input, button {
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-top:5px;
}

input {
  background:#2a2a2a;
  color:white;
}

button {
  font-weight:800;
  color:white;
  cursor:pointer;
}

.btn-fuel { background:#FF9800; }
.btn-robot { background:#4CAF50; }
.btn-carwash { background:#4A90E2; }
.btn-hair { background:#af52de; }

/* 🔥 리마인더 (전체 가로 차지) */
.reminder-card {
  grid-column: span 2;
  align-items: stretch;
}

.todo-list {
  margin-top:10px;
  max-height:150px;
  overflow-y:auto;
  width:100%;
}

.todo-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2a2a2a;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.todo-item span {
  flex:1;
  text-align:left;
}

.todo-item button {
  width:auto;
  padding:5px 10px;
  font-size:12px;
  background:#ff5252;
}
</style>
</head>

<body>
<div class="app-container">
<h2>✨ 내 비서</h2>

<div id="dashboard">

<!-- 기존 4개 유지 -->
<div class="card">
  <div class="card-title">🚗 이달의 주유</div>
  <div class="status-value" id="fuel-status">-</div>
  <button class="btn-fuel" onclick="recordAction('addFuel')">주유 기록</button>
</div>

<div class="card">
  <div class="card-title">🤖 로청이</div>
  <div class="status-value" id="robot-status">-</div>
  <button class="btn-robot" onclick="recordAction('addRobot')">청소 기록</button>
</div>

<div class="card">
  <div class="card-title">🫧 세차</div>
  <div class="status-value" id="carwash-status">-</div>
  <input type="number" id="wash-amount" placeholder="금액 입력">
  <button class="btn-carwash" onclick="recordCarWash()">차감</button>
</div>

<div class="card">
  <div class="card-title">✂️ Hair</div>
  <div class="status-value" id="hair-status">-</div>
  <input type="date" id="hairDateVal" onchange="recordHairCut()">
</div>

<!-- 🔥 리마인더 -->
<div class="card reminder-card">
  <div class="card-title">📌 리마인더</div>

  <input type="text" id="todo-input" placeholder="할 일 입력">
  <button onclick="addTodo()">추가</button>

  <div class="todo-list" id="todo-list"></div>
</div>

</div>
</div>

  <script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzkUvevOlAlTBptO0t4FTvgBVqB7KwasojlGphoybIzeYwX4UUgoVwVRlz-uwIQ4C39/exec'; // 본인의 웹앱 URL로 변경 필수

/* ---------- 데이터 초기 로드 ---------- */
function loadAll() {
  loadData();
  loadTodos();
}

function loadData() {
  fetch(`${GAS_URL}?action=getData`)
  .then(res => res.json())
  .then(res => {
    if(res.status === 'success') {
      const d = res.data;
      document.getElementById('fuel-status').innerText = d.fuel + "회";
      document.getElementById('robot-status').innerText = d.robot + "회";
      document.getElementById('carwash-status').innerText = d.carWash.toLocaleString() + "원";
      document.getElementById('hair-status').innerText = d.hairCutDate || "미설정";
    }
  });
}

/* ---------- 기존 기능 ---------- */
function recordAction(action){
  fetch(`${GAS_URL}?action=${action}`)
  .then(res => res.json())
  .then(data => {
    if(data.message) alert(data.message);
    loadData(); // 새로고침 대신 데이터만 다시 불러오기
  });
}

function recordCarWash(){
  const v = document.getElementById('wash-amount').value;
  if (!v) return;
  fetch(`${GAS_URL}?action=useCarWash&amount=${v}`)
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    document.getElementById('wash-amount').value = '';
    loadData();
  });
}

function recordHairCut(){
  const v = document.getElementById('hairDateVal').value;
  fetch(`${GAS_URL}?action=setHairCut&dateVal=${v}`)
  .then(res => res.json())
  .then(data => {
    alert(data.message);
    loadData();
  });
}

/* ---------- 🔥 리마인더 ---------- */
function loadTodos(){
  fetch(`${GAS_URL}?action=getTodos`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';

    data.todos.forEach((todo, i) => {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.innerHTML = `
        <span>${todo}</span>
        <button onclick="deleteTodo(${i})">삭제</button>
      `;
      list.appendChild(div);
    });
  });
}

function addTodo(){
  const v = document.getElementById('todo-input').value;
  if(!v) return;

  fetch(`${GAS_URL}?action=addTodo&text=${encodeURIComponent(v)}`)
  .then(res => res.json())
  .then(data => {
    document.getElementById('todo-input').value = '';
    loadTodos();
  });
}

function deleteTodo(index){
  fetch(`${GAS_URL}?action=deleteTodo&index=${index}`)
  .then(() => loadTodos());
}

// 창이 열릴 때 데이터 불러오기 실행
window.onload = loadAll;
</script>

</body>
</html>
