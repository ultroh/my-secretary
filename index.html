<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>내 비서</title>

    <style>
      :root {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --primary: #4A90E2;
        --fuel-color: #FF9800;
        --robot-color: #4CAF50;
        --hair-color: #af52de;
        --todo-color: #ff5e57;
        --text-main: #ffffff;
        --text-muted: #aaaaaa;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body, html {
        width: 100%; height: 100%;
        background-color: var(--bg-color);
        font-family: 'Pretendard', '-apple-system', sans-serif;
      }

      .app-container {
        max-width: 480px;
        margin: auto;
        height: 100dvh;
        padding: 10px 16px;
        display: flex;
        flex-direction: column;
      }

      h2 {
        color: var(--text-main);
        text-align: center;
        margin-bottom: 10px;
      }

      #dashboard {
        flex: 1;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, 1fr);
        gap: 12px;
      }

      .card {
        background: var(--card-bg);
        border-radius: 16px;
        padding: 12px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        text-align: center;
      }

      .card-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--text-muted);
      }

      .status-value {
        font-size: 20px;
        font-weight: 800;
        color: var(--text-main);
      }

      input {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: none;
        margin-top: 5px;
        background: #2a2a2a;
        color: white;
        font-size: 13px;
        text-align: center;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px;
        color: white;
        font-weight: bold;
      }

      .btn-todo { background: var(--todo-color); }

      /* ✅ ToDo 전용 */
      #todo-list {
        margin-top: 6px;
        max-height: 80px;
        overflow-y: auto;
        font-size: 12px;
      }

      .todo-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }

      .done {
        text-decoration: line-through;
        color: #777;
      }
    </style>
  </head>

  <body>
    <div class="app-container">
      <h2>✨ 내 비서</h2>

      <div id="dashboard">

        <!-- 기존 카드들 그대로 유지 -->
        <div class="card">
          <div class="card-title">🚗 이달의 주유</div>
          <div class="status-value" id="fuel-status"></div>
          <button onclick="recordAction('addFuel')">주유</button>
        </div>

        <div class="card">
          <div class="card-title">🤖 로청이</div>
          <div class="status-value" id="robot-status"></div>
          <button onclick="recordAction('addRobot')">청소</button>
        </div>

        <div class="card">
          <div class="card-title">🫧 세차</div>
          <div class="status-value" id="carwash-status"></div>
          <input id="wash" type="number" placeholder="금액">
          <button onclick="useCarWash()">차감</button>
        </div>

        <div class="card">
          <div class="card-title">✂️ Hair</div>
          <input type="date" id="hairDate" onchange="setHair()">
        </div>

        <!-- ✅ ToDo (UI 유지 + 기능 추가) -->
        <div class="card">
          <div class="card-title">📝 To Do</div>

          <input id="todo-input" placeholder="할 일 입력">
          <button class="btn-todo" onclick="addTodo()">추가</button>

          <div id="todo-list"></div>
        </div>

        <!-- 뉴스 -->
        <div class="card">
          <div class="card-title">📰 주요뉴스</div>
          <button onclick="alert('연결 예정')">보기</button>
        </div>

      </div>
    </div>

    <script>
      const URL = '여기에_GAS_URL';

      function load() {
        fetch(URL + '?action=getData')
          .then(r => r.json())
          .then(d => {
            document.getElementById('fuel-status').innerText = d.data.fuel + "/3";
            document.getElementById('robot-status').innerText = d.data.robot + "/2";
            document.getElementById('carwash-status').innerText = d.data.carWash;
          });

        loadTodo();
      }

      function recordAction(a) {
        fetch(URL + '?action=' + a).then(load);
      }

      function useCarWash() {
        const v = document.getElementById('wash').value;
        fetch(URL + '?action=useCarWash&amount=' + v).then(load);
      }

      function setHair() {
        const d = document.getElementById('hairDate').value;
        fetch(URL + '?action=setHairCut&dateVal=' + d);
      }

      // ✅ ToDo
      function loadTodo() {
        fetch(URL + '?action=getTodo')
          .then(r => r.json())
          .then(res => {
            const el = document.getElementById('todo-list');
            el.innerHTML = '';

            res.data.forEach(i => {
              const div = document.createElement('div');
              div.className = 'todo-item';

              div.innerHTML = `
                <span class="${i.done ? 'done' : ''}">${i.text}</span>
                <div>
                  <button onclick="toggleTodo('${i.id}')">${i.done ? '↩' : '✔'}</button>
                  <button onclick="deleteTodo('${i.id}')">❌</button>
                </div>
              `;

              el.appendChild(div);
            });
          });
      }

      function addTodo() {
        const t = document.getElementById('todo-input').value;
        if (!t) return;

        fetch(URL + '?action=addTodo&text=' + encodeURIComponent(t))
          .then(() => {
            document.getElementById('todo-input').value = '';
            loadTodo();
          });
      }

      function toggleTodo(id) {
        fetch(URL + '?action=toggleTodo&id=' + id).then(loadTodo);
      }

      function deleteTodo(id) {
        fetch(URL + '?action=deleteTodo&id=' + id).then(loadTodo);
      }

      window.onload = load;
    </script>
  </body>
</html>
