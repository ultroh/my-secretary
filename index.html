<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>내 비서</title>

<style>
:root {
  --bg-color: #121212;
  --card-bg: #1e1e1e;
  --primary: #4A90E2;
  --fuel-color: #FF9800;
  --robot-color: #4CAF50;
  --hair-color: #af52de;
  --text-main: #ffffff;
  --text-muted: #aaaaaa;
}

* { box-sizing: border-box; margin:0; padding:0; }

body, html {
  width:100%; height:100%;
  background-color: var(--bg-color);
  font-family: 'Pretendard', sans-serif;
}

.app-container {
  max-width:480px;
  margin:auto;
  height:100dvh;
  padding:10px 16px;
  display:flex;
  flex-direction:column;
}

h2 { color:white; text-align:center; margin:5px 0 10px; }

#dashboard {
  flex:1;
  display:grid;
  grid-template-columns: repeat(2,1fr);
  grid-template-rows: auto auto 1fr;
  gap:12px;
}

.card {
  background: var(--card-bg);
  border-radius:16px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  text-align: center;
}

.card-title { font-size:14px; color: var(--text-muted); }

.status-value {
  font-size:22px;
  font-weight:900;
  color:white;
  line-height: 1.2;
}

.small-info {
  font-size: 13px;
  font-weight: normal;
  color: #888;
  display: block;
  margin-top: 2px;
}

input, button {
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-top:5px;
  transition: all 0.2s;
}

input { background:#2a2a2a; color:white; }

button { font-weight:800; color:white; cursor:pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-fuel { background: var(--fuel-color); }
.btn-robot { background: var(--robot-color); }
.btn-carwash { background: var(--primary); }
.btn-hair { background: var(--hair-color); }

.reminder-card {
  grid-column: span 2;
  align-items: stretch;
  justify-content: flex-start;
}

.todo-input-group {
  display: flex;
  width: 100%;
  gap: 8px;
  margin-top: 10px;
  margin-bottom: 5px;
}

.todo-input-group input { flex: 1; margin-top: 0; }
.todo-input-group button {
  width: auto;
  padding: 10px 20px;
  margin-top: 0;
  background-color: var(--primary);
}

.todo-list {
  margin-top:10px;
  max-height:180px;
  overflow-y:auto;
  width:100%;
}

.todo-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2a2a2a;
  padding:8px;
  border-radius:8px;
  margin-bottom:6px;
}

.todo-item span { flex:1; text-align:left; color: white; }
.todo-item button {
  width:auto;
  padding:5px 10px;
  margin-top: 0;
  font-size:12px;
  background:#ff5252;
}
</style>
</head>

<body>
<div class="app-container">
<h2>✨ 내 비서</h2>

<div id="dashboard">

<div class="card">
  <div class="card-title">🚗 이달의 주유</div>
  <div class="status-value" id="fuel-status">- / 3회</div>
  <button class="btn-fuel" id="btn-fuel" onclick="recordAction('addFuel', this, '주유 기록')">주유 기록</button>
</div>

<div class="card">
  <div class="card-title">🤖 로청이</div>
  <div class="status-value" id="robot-status">- / 2회</div>
  <button class="btn-robot" id="btn-robot" onclick="recordAction('addRobot', this, '청소 기록')">청소 기록</button>
</div>

<div class="card">
  <div class="card-title">🫧 세차</div>
  <div class="status-value" id="carwash-status">-원</div>
  <input type="number" id="wash-amount" placeholder="금액 입력">
  <button class="btn-carwash" id="btn-carwash" onclick="recordCarWash(this)">차감</button>
</div>

<div class="card">
  <div class="card-title">✂️ 머리한 날</div>
  <div class="status-value" id="hair-status">-</div>
  <button class="btn-hair" id="btn-hair" onclick="document.getElementById('hairDateVal').showPicker()">날짜선택</button>
  <input type="date" id="hairDateVal" style="position:absolute; opacity:0; pointer-events:none;" onchange="recordHairCut(document.getElementById('btn-hair'))">
</div>

<div class="card reminder-card">
  <div class="card-title">📌 리마인더</div>
  <div class="todo-input-group">
    <input type="text" id="todo-input" placeholder="할 일 입력">
    <button id="btn-add-todo" onclick="addTodo(this)">추가</button>
  </div>
  <div class="todo-list" id="todo-list"></div>
</div>

</div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwhZRmg-lxhZxxAeglplBq6yV_XCnuU-FT0rl-sm683Jq23BqjWKfYS9rg1UOl-My6vtQ/exec'; 

function loadAll() {
  loadData();
  loadTodos();
}

// 버튼 로딩 상태 전환 함수
function toggleLoading(btn, isLoading, originalText) {
  if (isLoading) {
    btn.disabled = true;
    btn.innerText = '기록 중...';
  } else {
    btn.disabled = false;
    btn.innerText = originalText;
  }
}

function getHaircutStatus(dateStr) {
  if (!dateStr) return "기록 없음";
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const targetDate = new Date(dateStr);
  targetDate.setHours(0, 0, 0, 0);
  const diffTime = today - targetDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  const weeks = Math.floor(diffDays / 7);
  return `D+${diffDays}<br><span class="small-info">(${weeks}주차)</span><span class="small-info" style="color:#666;">${dateStr}</span>`;
}

function loadData() {
  fetch(`${GAS_URL}?action=getData`)
  .then(res => res.json())
  .then(res => {
    if(res.status === 'success') {
      const d = res.data;
      document.getElementById('fuel-status').innerText = d.fuel + " / 3회";
      document.getElementById('robot-status').innerText = d.robot + " / 2회";
      document.getElementById('carwash-status').innerText = d.carWash.toLocaleString() + "원";
      document.getElementById('hair-status').innerHTML = getHaircutStatus(d.hairCutDate);
    }
  });
}

function recordHairCut(btn){
  const v = document.getElementById('hairDateVal').value;
  if(!v) return;
  toggleLoading(btn, true, '날짜선택');
  fetch(`${GAS_URL}?action=setHairCut&dateVal=${v}`)
  .then(res => res.json())
  .then(() => {
    toggleLoading(btn, false, '날짜선택');
    loadData();
  });
}

function recordAction(action, btn, originalText){
  toggleLoading(btn, true, originalText);
  fetch(`${GAS_URL}?action=${action}`)
  .then(res => res.json())
  .then(data => {
    toggleLoading(btn, false, originalText);
    if(data.message) alert(data.message);
    loadData();
  });
}

function recordCarWash(btn){
  const v = document.getElementById('wash-amount').value;
  if (!v) return;
  toggleLoading(btn, true, '차감');
  fetch(`${GAS_URL}?action=useCarWash&amount=${v}`)
  .then(res => res.json())
  .then(data => {
    toggleLoading(btn, false, '차감');
    alert(data.message);
    document.getElementById('wash-amount').value = '';
    loadData();
  });
}

function loadTodos(){
  fetch(`${GAS_URL}?action=getTodos`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    data.todos.forEach((todo, i) => {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.innerHTML = `<span>• ${todo}</span><button onclick="deleteTodo(${i}, this)">삭제</button>`;
      list.appendChild(div);
    });
  });
}

function addTodo(btn){
  const v = document.getElementById('todo-input').value;
  if(!v) return;
  toggleLoading(btn, true, '추가');
  fetch(`${GAS_URL}?action=addTodo&text=${encodeURIComponent(v)}`)
  .then(() => {
    toggleLoading(btn, false, '추가');
    document.getElementById('todo-input').value = '';
    loadTodos();
  });
}

function deleteTodo(index, btn){
  const originalText = btn.innerText;
  btn.disabled = true;
  btn.innerText = '...';
  fetch(`${GAS_URL}?action=deleteTodo&index=${index}`)
  .then(() => loadTodos());
}

window.onload = loadAll;
</script>

</body>
</html>
