<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>내 비서</title>
  <style>
    /* 여백 최소화 및 박스 모델 설정 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      padding: 12px; /* 외곽 여백 축소 */
      height: 100vh; /* 화면 높이 꽉 채움 */
      display: flex;
      flex-direction: column;
      overflow: hidden; /* 스크롤 방지 */
    }
    
    .app-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      justify-content: space-around; /* 요소들을 화면에 균등 분배 */
    }

    h2 {
      text-align: center;
      font-size: 20px; /* 제목 크기 축소 */
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }

    /* 카드 디자인: 상하 패딩과 마진 대폭 축소 */
    .action-card {
      background-color: #1c1c1e;
      padding: 16px; /* 내부 여백 축소 */
      border-radius: 20px;
      margin-bottom: 10px; /* 카드 간격 축소 */
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1; /* 카드들이 화면 높이를 나눠 가짐 */
      justify-content: center;
    }
    
    .action-card h3 {
      font-size: 14px; /* 소제목 크기 축소 */
      font-weight: 600;
      margin-bottom: 4px;
      color: #a1a1a6;
    }

    /* 데이터 값 크기 조정 */
    .data-value {
      font-size: 32px; /* 시원하면서도 너무 크지 않게 조정 */
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1;
    }

    /* 버튼 높이 최적화 */
    button {
      width: 100%;
      padding: 14px; /* 터치감은 유지하되 높이 축소 */
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      color: white;
    }
    
    button:active { transform: scale(0.97); }

    .btn-fuel { background-color: #ff9500; }
    .btn-robot { background-color: #34c759; }
    .btn-wash { background-color: #007aff; }

    /* 세차장 입력창 영역 축소 */
    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      text-align: center;
      border: none;
      border-radius: 12px;
      background-color: #2c2c2e;
      color: #ffffff;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2>✨ 내 비서</h2>
    
    <div class="action-card">
      <h3>🚗 이달의 주유</h3>
      <div class="data-value" id="fuel-data">0 / 3회</div>
      <button class="btn-fuel" onclick="runAction('addFuel')">주유 기록</button>
    </div>

    <div class="action-card">
      <h3>🤖 로청이 현황</h3>
      <div class="data-value" id="robot-data">1회</div>
      <button class="btn-robot" onclick="runAction('addRobot')">청소 시작</button>
    </div>

    <div class="action-card">
      <h3>🫧 세차 잔액</h3>
      <div class="data-value" id="wash-data">21,000원</div>
      <div class="input-group">
        <input type="number" id="washAmount" placeholder="차감 금액 (예: 6000)">
        <button class="btn-wash" onclick="runCarWash()">잔액 차감</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwfQbj7RGq3h9wLsLM1FJVwVPiolWHbst1KFeZzXoyV8rv3RxKXdVe8VQOXamrtu39AGA/exec';

    window.onload = function() {
      fetch(GAS_URL + '?action=getData')
        .then(response => response.json())
        .then(res => {
          if(res.status === 'success') {
            document.getElementById('fuel-data').innerText = `${res.data.fuel} / 3회`;
            document.getElementById('robot-data').innerText = `${res.data.robot}회`;
            document.getElementById('wash-data').innerText = `${res.data.carWash.toLocaleString()}원`; 
          }
        });
    };

    function runAction(action) {
      fetch(`${GAS_URL}?action=${action}`).then(() => window.location.reload());
    }

    function runCarWash() {
      const amount = document.getElementById('washAmount').value;
      if (!amount) return alert('금액 입력!');
      fetch(`${GAS_URL}?action=useCarWash&amount=${amount}`).then(() => window.location.reload());
    }
  </script>

</body>
</html>
