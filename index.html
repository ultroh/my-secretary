<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>내 비서</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      /* 터치 시 하이라이트 제거 */
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      
      /* 1. 아이폰 12 미니 노치 및 Safe Area 대응 */
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      
      /* 2. 당겨서 새로고침(Pull-to-Refresh) 활성화 */
      overflow-y: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch; /* iOS 부드러운 스크롤 */
    }
    
    .app-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      /* 12 미니의 작은 화면에서도 한눈에 들어오도록 비율 조정 */
      height: 100%;
      min-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      padding: 10px 16px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin: 15px 0;
      color: #ffffff;
    }

    .action-card {
      background-color: #1c1c1e;
      padding: 16px;
      border-radius: 20px;
      margin-bottom: 12px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      /* 12 미니 화면 높이에 맞춰 유연하게 조절 */
      flex: 1;
      justify-content: center;
      min-height: 130px; 
    }
    
    .action-card h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #a1a1a6;
    }

    .data-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.1;
      /* 세차 잔액 등 긴 숫자/글자가 칸을 벗어나지 않게 강제 줄바꿈 (이전 요청 반영) */
      word-break: break-all;
      overflow-wrap: break-word;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      color: white;
      cursor: pointer;
    }
    
    button:active { transform: scale(0.97); }

    .btn-fuel { background-color: #ff9500; }
    .btn-robot { background-color: #34c759; }
    .btn-wash { background-color: #007aff; }

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    input[type="number"] {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      text-align: center;
      border: none;
      border-radius: 12px;
      background-color: #2c2c2e;
      color: #ffffff;
      outline: none;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2>✨ 내 비서</h2>
    
    <div class="action-card">
      <h3>🚗 이달의 주유</h3>
      <div class="data-value" id="fuel-data">...</div>
      <button class="btn-fuel" onclick="runAction('addFuel')">주유 기록</button>
    </div>

    <div class="action-card">
      <h3>🤖 로청이 현황</h3>
      <div class="data-value" id="robot-data">...</div>
      <button class="btn-robot" onclick="runAction('addRobot')">청소 기록</button>
    </div>

    <div class="action-card">
      <h3>🫧 세차 잔액</h3>
      <div class="data-value" id="wash-data">...</div>
      <div class="input-group">
        <input type="number" id="washAmount" placeholder="차감 금액 (예: 6000)">
        <button class="btn-wash" onclick="runCarWash()">잔액 차감</button>
      </div>
    </div>
  </div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwfQbj7RGq3h9wLsLM1FJVwVPiolWHbst1KFeZzXoyV8rv3RxKXdVe8VQOXamrtu39AGA/exec';

    function loadData() {
      fetch(GAS_URL + '?action=getData')
        .then(response => response.json())
        .then(res => {
          if(res.status === 'success') {
            document.getElementById('fuel-data').innerText = `${res.data.fuel} / 3회`;
            document.getElementById('robot-data').innerText = `${res.data.robot} / 2회`;
            document.getElementById('wash-data').innerText = `${res.data.carWash.toLocaleString()}원`; 
          }
        })
        .catch(() => {
            // 네트워크 오류 시에만 최소한의 안내 팝업 유지
            alert("연결 상태를 확인해 주세요.");
        });
    }

    window.onload = loadData;

    function runAction(action) {
      const targetId = action === 'addFuel' ? 'fuel-data' : 'robot-data';
      document.getElementById(targetId).innerText = "...";
      
      fetch(`${GAS_URL}?action=${action}`)
        .then(response => response.json())
        .then(res => {
          // 팝업(alert) 호출 삭제 -> 바로 데이터 리프레시 실행
          loadData(); 
        });
    }

    function runCarWash() {
      const amount = document.getElementById('washAmount').value;
      if (!amount) return alert('금액을 입력하세요.');
      
      document.getElementById('wash-data').innerText = "...";
      
      fetch(`${GAS_URL}?action=useCarWash&amount=${amount}`)
        .then(response => response.json())
        .then(res => {
          // 세차 잔액 부족 등의 중요 알림이 필요할 수 있으나, 
          // 요청하신 대로 기본 팝업을 제거하고 즉시 데이터 갱신
          if (res.message.includes('부족합니다')) {
            alert(res.message); // 잔액 부족 에러만 예외적으로 팝업 유지
          }
          document.getElementById('washAmount').value = ''; // 입력창 비우기
          loadData(); 
        });
    }
  </script>

</body>
</html>
