<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>My Log</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
:root {
  --bg-color: #121212;
  --card-bg: #1e1e1e;
  --primary: #4A90E2;
  --fuel-color: #FF9800;
  --robot-color: #4CAF50;
  --hair-color: #af52de;
  --text-main: #ffffff;
  --text-muted: #aaaaaa;
}

* { box-sizing: border-box; margin:0; padding:0; }

body, html {
  width:100%; height:100%;
  background-color: var(--bg-color);
  font-family: 'Pretendard', sans-serif;
}

.app-container {
  max-width:480px;
  margin:auto;
  height:100dvh;
  padding:10px 16px;
  display:flex;
  flex-direction:column;
}

h2 { color:white; text-align:center; margin:5px 0 10px; }

#dashboard {
  flex:1;
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  grid-template-rows: auto 1fr 1fr; 
  gap:12px;
}

.card {
  background: var(--card-bg);
  border-radius:16px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  align-items:center;
  text-align: center;
}

.card-title { font-size:14px; color: var(--text-muted); }

.status-value {
  font-size:22px;
  font-weight:900;
  color:white;
  line-height: 1.2;
}

.small-info {
  font-size: 13px;
  font-weight: normal;
  color: #888;
  display: block;
  margin-top: 2px;
}

input, button {
  width:100%;
  border:none;
  border-radius:10px;
  padding:10px;
  margin-top:5px;
  transition: all 0.2s;
}

input { 
  background: #2a2a2a; 
  color: white; 
  text-align: center; /* 👈 모든 입력창(세차, 리마인더 등)의 글자를 가운데로! */
}

button { font-weight:800; color:white; cursor:pointer; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-fuel { background: var(--fuel-color); }
.btn-robot { background: var(--robot-color); }
.btn-carwash { background: var(--primary); }
.btn-hair { background: var(--hair-color); }

.reminder-card {
  grid-column: span 2;
  align-items: stretch;
  justify-content: flex-start;
}

.todo-input-group {
  display: flex;
  width: 100%;
  gap: 8px;
  margin-top: 10px;
  margin-bottom: 5px;
}

/* 추가 버튼 스타일: 리스트 아이템과 높이를 맞춤 */
.todo-input-group button {
  width: auto;
  min-width: 55px;      /* '추가' 글자가 여유 있게 들어가도록 소폭 조정 */
  padding: 8px 12px;    /* 리스트 아이템(8px)과 동일한 높이감 */
  margin-top: 0;
  font-size: 13px;      /* 리스트 텍스트와 동일한 크기 */
  background-color: var(--primary);
  border-radius: 8px;   /* 아이템과 곡률 통일 */
}

/* 입력창 스타일: 가운데 정렬 유지 및 높이 키움 */
.todo-input-group input { 
  flex: 1; 
  margin-top: 0; 
  text-align: center; 
  padding: 8px 10px;    /* 리스트 아이템과 동일한 패딩 */
  font-size: 13px;      /* 리스트 텍스트와 동일한 크기 */
}
  
/* 목록과 입력창 사이 간격 좁히기 */
.todo-list {
  margin-top: 4px;      /* 기존 10px에서 4px로 줄임 */
  max-height: 135px;
  overflow-y: auto;
  width: 100%;
}

.todo-item {
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#2a2a2a;
  padding:8px 10px;
  border-radius:8px;
  margin-bottom:6px;
  gap: 8px;
}

/* 🔥 드래그 핸들 및 애니메이션 스타일 추가 */
.drag-handle {
  color: #888;
  cursor: grab;
  font-size: 16px;
  padding: 0 5px;
}
.todo-item.sortable-ghost { opacity: 0.4; }

.todo-item span.text { 
  flex:1; 
  text-align:left; 
  color: white; 
  font-size: 13px; 
  white-space: nowrap; 
  overflow: hidden; 
  text-overflow: ellipsis; 
}

.todo-item button {
  width:auto;
  min-width: 45px;
  padding:5px 8px;
  margin-top: 0;
  font-size: 11px;
  background:#ff5252;
}
</style>
</head>

<body>
<div class="app-container">
<h2>✨ My Log 🌸</h2>

<div id="dashboard">

<div class="card reminder-card">
  <div class="card-title font-bold mb-4">📌 리마인더</div>
  
  <div class="todo-input-group flex justify-center gap-2">
    <input type="text" id="todo-input" placeholder="지금 떠오른 생각을 입력하세요" 
           class="text-center border-2 border-slate-200 rounded-xl focus:border-blue-400 outline-none transition-all w-2/3 max-w-xs">
    
    <button id="btn-add-todo" onclick="addTodo(this)" 
            class="bg-blue-500 text-white hover:bg-blue-600 active:scale-95 transition-all font-bold">
      추가
    </button>
  </div>
  
  <div class="todo-list" id="todo-list"></div>
</div>

<div class="card">
  <div class="card-title">🚗 이달의 주유</div>
  <div class="status-value" id="fuel-status">- / 3회</div>
  <button class="btn-fuel" onclick="recordAction('addFuel', this, '주유 기록')">주유 기록</button>
</div>

<div class="card">
  <div class="card-title">🤖 로청이</div>
  <div class="status-value" id="robot-status">- / 2회</div>
  <button class="btn-robot" onclick="recordAction('addRobot', this, '청소 기록')">청소 기록</button>
</div>

<div class="card">
  <div class="card-title">🫧 세차 잔액</div>
  <div class="status-value" id="carwash-status">-원</div>
  <input type="number" id="wash-amount" placeholder="금액 입력">
  <button class="btn-carwash" onclick="recordCarWash(this)">차감</button>
</div>

<div class="card">
  <div class="card-title">✂️ 머리한 날</div>
  <div class="status-value" id="hair-status">-</div>
  <div style="position: relative; width: 100%; margin-top: 5px;">
    <button class="btn-hair" id="btn-hair" style="width: 100%; pointer-events: none;">날짜선택</button>
    <input type="date" id="hairDateVal" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;" onchange="recordHairCut(document.getElementById('btn-hair'))">
  </div>
</div>

</div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgRQ_fvLToFTWS2IWrJJSf29uBqUzYBbBWpcFyTt8gsk5dDwLMGcHtgx1DZHNifKBfEA/exec'; 

function loadAll() {
  loadData();
  loadTodos();
}

function toggleLoading(btn, isLoading, originalText) {
  if (isLoading) {
    btn.disabled = true;
    btn.innerText = '...';
  } else {
    btn.disabled = false;
    btn.innerText = originalText;
  }
}

// ... (기존 데이터 로드 및 처리 함수들 동일) ...
function getHaircutStatus(dateStr) {
  if (!dateStr) return "기록 없음";
  const cleanDateStr = dateStr.replace(/[.\s]+/g, '-').replace(/-$/, '');
  const targetDate = new Date(cleanDateStr);
  if (isNaN(targetDate.getTime())) return "날짜 형식 오류";
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  targetDate.setHours(0, 0, 0, 0);
  const diffTime = today - targetDate;
  const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
  const weeks = Math.floor(diffDays / 7) + 1;
  return `D+${diffDays}<br><span class="small-info">(${weeks}주차)</span><span class="small-info" style="color:#666;">${dateStr}</span>`;
}

function loadData() {
  fetch(`${GAS_URL}?action=getData&_t=${Date.now()}`)
  .then(res => res.json())
  .then(res => {
    if(res.status === 'success') {
      const d = res.data;
      document.getElementById('fuel-status').innerText = d.fuel + " / 3회";
      document.getElementById('robot-status').innerText = d.robot + " / 2회";
      document.getElementById('carwash-status').innerText = d.carWash.toLocaleString() + "원";
      document.getElementById('hair-status').innerHTML = getHaircutStatus(d.hairCutDate);
    }
  });
}

function recordHairCut(btn){
  const v = document.getElementById('hairDateVal').value;
  if(!v) return;
  toggleLoading(btn, true, '날짜선택');
  fetch(`${GAS_URL}?action=setHairCut&dateVal=${v}`)
  .then(res => res.json())
  .then(() => { toggleLoading(btn, false, '날짜선택'); loadData(); });
}

function recordAction(action, btn, originalText){
  toggleLoading(btn, true, originalText);
  fetch(`${GAS_URL}?action=${action}`)
  .then(res => res.json())
  .then(data => {
    toggleLoading(btn, false, originalText);
    if(data.message) alert(data.message);
    loadData();
  });
}

function recordCarWash(btn){
  const v = document.getElementById('wash-amount').value;
  if (!v) return;
  toggleLoading(btn, true, '차감');
  fetch(`${GAS_URL}?action=useCarWash&amount=${v}`)
  .then(res => res.json())
  .then(data => {
    toggleLoading(btn, false, '차감');
    alert(data.message);
    document.getElementById('wash-amount').value = '';
    loadData();
  });
}

// 🔥 리마인더 렌더링 및 Sortable 적용
function loadTodos(){
  fetch(`${GAS_URL}?action=getTodos&_t=${Date.now()}`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    data.todos.forEach((todo, i) => {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.dataset.text = todo; // 순서 저장용 데이터
      div.innerHTML = `<span class="drag-handle">☰</span><span class="text">${todo}</span><button onclick="deleteTodo(${i}, this)">삭제</button>`;
      list.appendChild(div);
    });

    // Sortable 라이브러리 실행
    new Sortable(list, {
      handle: '.drag-handle', // ☰ 아이콘을 잡아야만 드래그 됨 (모바일 스크롤 방해 방지)
      animation: 150,
      onEnd: function (evt) {
        saveOrder(); // 드래그가 끝나면 백엔드로 새로운 순서 전송
      }
    });
  });
}

// 🔥 변경된 순서를 백엔드로 보내는 함수 추가
function saveOrder() {
  const listItems = document.querySelectorAll('.todo-item');
  const newOrder = Array.from(listItems).map(item => item.dataset.text);
  
  const encodedData = encodeURIComponent(JSON.stringify(newOrder));
  fetch(`${GAS_URL}?action=updateTodoOrder&data=${encodedData}`)
  .then(res => console.log('순서 저장 완료'));
}

function addTodo(btn){
  const v = document.getElementById('todo-input').value;
  if(!v) return;
  toggleLoading(btn, true, '추가');
  fetch(`${GAS_URL}?action=addTodo&text=${encodeURIComponent(v)}`)
  .then(() => {
    toggleLoading(btn, false, '추가');
    document.getElementById('todo-input').value = '';
    loadTodos();
  });
}

function deleteTodo(index, btn){
  btn.disabled = true;
  btn.innerText = '...';
  fetch(`${GAS_URL}?action=deleteTodo&index=${index}`)
  .then(() => loadTodos());
}

window.onload = loadAll;
</script>

</body>
</html>
