<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Malgun Gothic', sans-serif;
      padding: 20px;
      background-color: #f4f4f9;
      color: #333;
    }
    /* 화면 짤림 방지 핵심 CSS */
    .container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      box-sizing: border-box; /* 패딩 포함 너비 계산 */
      word-break: break-all;  /* 긴 텍스트 강제 줄바꿈 */
      overflow-wrap: break-word;
    }
    .section {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-top: 10px;
    }
    button:active {
      background-color: #45a049;
    }
    input[type="number"] {
      width: calc(100% - 22px);
      padding: 10px;
      margin-top: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }
    .status {
      font-weight: bold;
      color: #007BFF;
      margin-top: 10px;
      display: block;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>내 비서</h2>

  <div class="section">
    <h3>⛽ 주유 관리</h3>
    <span class="status" id="fuel-status">상태 확인 중...</span>
    <button onclick="requestAction('addFuel')">주유 1회 추가</button>
  </div>

  <div class="section">
    <h3>🤖 로청이 관리</h3>
    <span class="status" id="robot-status">상태 확인 중...</span>
    <button onclick="requestAction('addRobot')">로청이 돌림 기록</button>
  </div>

  <div class="section">
    <h3>🚗 세차 잔액 관리</h3>
    <span class="status" id="carwash-status">상태 확인 중...</span>
    <input type="number" id="wash-amount" placeholder="차감할 금액 입력 (예: 5000)">
    <button onclick="useCarWash()">세차 잔액 차감</button>
  </div>
</div>

<script>
  // 웹앱 URL을 여기에 입력하세요
  const WEB_APP_URL = "여기에_배포된_웹앱_URL을_넣으세요";

  function requestAction(action, amount = 0) {
    let url = WEB_APP_URL + "?action=" + action;
    if (amount > 0) {
      url += "&amount=" + amount;
    }

    fetch(url)
      .then(response => response.json())
      .then(data => {
        if (data.status === 'success') {
          alert(data.message);
          // 액션 완료 후 최신 상태를 다시 불러오고 싶다면 여기서 getData를 호출
        } else {
          alert("오류 발생: " + data.message);
        }
      })
      .catch(error => alert("네트워크 오류: " + error));
  }

  function useCarWash() {
    const amountInput = document.getElementById("wash-amount").value;
    if (!amountInput || amountInput <= 0) {
      alert("올바른 금액을 입력하세요.");
      return;
    }
    requestAction('useCarWash', amountInput);
  }
</script>

</body>
</html>
