<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>내 비서</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", Roboto, sans-serif;
      background-color: #000000;
      color: #ffffff;
      
      padding-top: env(safe-area-inset-top);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      
      overflow-y: auto;
      height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }
    
    .app-container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      padding: 10px 16px;
    }

    h2 {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      margin: 15px 0;
      color: #ffffff;
    }

    /* 2x2 그리드 레이아웃 적용 */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      flex: 1;
    }

    .action-card {
      background-color: #1c1c1e;
      padding: 16px;
      border-radius: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 150px; 
    }
    
    .action-card h3 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #a1a1a6;
    }

    .data-value {
      font-size: 24px; /* 2칸 배열에 맞춰 크기 축소 */
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.2;
      word-break: break-all;
      overflow-wrap: break-word;
    }

    button {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      color: white;
      cursor: pointer;
    }
    
    button:active { transform: scale(0.97); }

    .btn-fuel { background-color: #ff9500; }
    .btn-robot { background-color: #34c759; }
    .btn-wash { background-color: #007aff; }
    .btn-hair { background-color: #af52de; } /* 새로운 버튼 색상 (보라색) */

    .input-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    
    input[type="number"], input[type="date"] {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      text-align: center;
      border: none;
      border-radius: 12px;
      background-color: #2c2c2e;
      color: #ffffff;
      outline: none;
    }
    
    /* 날짜 선택 아이콘 색상 보정 */
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
    }
  </style>
</head>
<body>

  <div class="app-container">
    <h2>✨ 내 비서</h2>
    
    <div class="grid-container">
      <div class="action-card">
        <h3>🚗 이달의 주유</h3>
        <div class="data-value" id="fuel-data">...</div>
        <button class="btn-fuel" onclick="runAction('addFuel')">주유 기록</button>
      </div>

      <div class="action-card">
        <h3>🤖 로청이 현황</h3>
        <div class="data-value" id="robot-data">...</div>
        <button class="btn-robot" onclick="runAction('addRobot')">청소 기록</button>
      </div>

      <div class="action-card">
        <h3>🫧 세차 잔액</h3>
        <div class="data-value" id="wash-data">...</div>
        <div class="input-group">
          <input type="number" id="washAmount" placeholder="금액 입력">
          <button class="btn-wash" onclick="runCarWash()">잔액 차감</button>
        </div>
      </div>

      <div class="action-card">
        <h3>✂️ Hair Cut Day</h3>
        <div class="data-value" id="hair-data">...</div>
        <div class="input-group">
          <input type="date" id="hairDateVal">
          <button class="btn-hair" onclick="runHairCut()">날짜 저장</button>
        </div>
      </div>
    </div>
  </div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby2IBA_bIu0sy2Wwc7zeItLBpOPUtYisoPkvkH-_3rhtdrYTzFI8ckJzJ0ttwtsb6Y8Bg/exec';

    function loadData() {
      const noCacheUrl = GAS_URL + '?action=getData&t=' + new Date().getTime();
      
      fetch(noCacheUrl)
        .then(response => response.json())
        .then(res => {
          if(res.status === 'success') {
            document.getElementById('fuel-data').innerText = `${res.data.fuel} / 3회`;
            document.getElementById('robot-data').innerText = `${res.data.robot} / 2회`;
            document.getElementById('wash-data').innerText = `${res.data.carWash.toLocaleString()}원`; 
            
            // 헤어컷 D-day 및 주차 계산 로직
            if (res.data.hairCutDate) {
              const pastDate = new Date(res.data.hairCutDate);
              const today = new Date();
              pastDate.setHours(0,0,0,0);
              today.setHours(0,0,0,0);
              
              const diffTime = today.getTime() - pastDate.getTime();
              const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
              const diffWeeks = Math.floor(diffDays / 7) + 1;
              
              if (diffDays >= 0) {
                document.getElementById('hair-data').innerText = `D+${diffDays} (${diffWeeks}주차)`;
              } else {
                document.getElementById('hair-data').innerText = "예약일";
              }
              document.getElementById('hairDateVal').value = res.data.hairCutDate;
            } else {
              document.getElementById('hair-data').innerText = "입력 필요";
            }
          }
        });
    }

    window.onload = loadData;

    function runAction(action) {
      const targetId = action === 'addFuel' ? 'fuel-data' : 'robot-data';
      document.getElementById(targetId).innerText = "...";
      
      const noCacheUrl = `${GAS_URL}?action=${action}&t=${new Date().getTime()}`;
      
      fetch(noCacheUrl)
        .then(response => response.json())
        .then(res => {
          if (res.message.includes('사용하셨습니다') || res.message.includes('알람을 보내드립니다')) {
            alert(res.message);
          }
          loadData(); 
        });
    }

    function runCarWash() {
      const amount = document.getElementById('washAmount').value;
      if (!amount) return alert('금액을 입력하세요.');
      
      document.getElementById('wash-data').innerText = "...";
      const noCacheUrl = `${GAS_URL}?action=useCarWash&amount=${amount}&t=${new Date().getTime()}`;
      
      fetch(noCacheUrl)
        .then(response => response.json())
        .then(res => {
          if (res.message.includes('부족합니다')) {
            alert(res.message);
          }
          document.getElementById('washAmount').value = ''; 
          loadData(); 
        });
    }

    function runHairCut() {
      const dateVal = document.getElementById('hairDateVal').value;
      if (!dateVal) return alert('날짜를 선택하세요.');

      document.getElementById('hair-data').innerText = "...";
      const noCacheUrl = `${GAS_URL}?action=setHairCut&dateVal=${dateVal}&t=${new Date().getTime()}`;

      fetch(noCacheUrl)
        .then(response => response.json())
        .then(res => {
          loadData();
        });
    }
  </script> 

</body>
</html>
