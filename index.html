<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Archive</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>
:root {
  --bg-color: #002147;
  --card-bg: #ffffff;
  --primary: #002147;
  --accent-red: #C8102E;
  --text-main: #1a1a1a;
  --text-muted: #666666;
  --line-color: #e0e0e0;
  --hyundai-blue: #002c5f;
  --mini-red: #e20112;
}

* { box-sizing: border-box; margin:0; padding:0; }

body, html {
  width:100%;
  height: 100%; /* 전체 높이 고정 */
  background-color: var(--bg-color);
  background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
  background-size: 24px 24px;
  font-family: 'Pretendard', -apple-system, sans-serif;
  overscroll-behavior-y: contain;
  overflow: hidden; /* 전체 스크롤 방지 */
}

.app-container {
  max-width:480px;
  margin:auto;
  height: 100dvh; /* 기기 화면 높이에 맞춤 */
  padding: 4px 12px 12px; /* 상하 패딩 대폭 축소 */
  display:flex;
  flex-direction:column;
  position: relative;
}

#pull-indicator {
  position: absolute;
  top: 0; left: 0; width: 100%;
  height: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-color);
  color: #ffffff;
  z-index: 100;
}

h2 { 
  color:white; 
  text-align:center; 
  margin: 8px 0 8px; /* 여백 축소 */
  font-size: 1.2rem; 
  font-weight: 900;
  letter-spacing: 1px;
}

#dashboard {
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  grid-auto-rows: auto;
  gap: 8px; /* 카드 사이 간격 축소 */
  flex: 1; /* 남은 공간 차지 */
}

.card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 10px; /* 내부 패딩 축소 */
  display:flex;
  flex-direction:column;
  justify-content: space-between;
  align-items:center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  border-top: 3px solid var(--accent-red); /* 선 두께 약간 축소 */
}

.stat-card {
  height: 130px; /* 높이 10px 축소 */
}

.card-title { 
  font-size: 11px; /* 폰트 살짝 축소 */
  font-weight: 800;
  color: var(--primary); 
  margin-bottom: 4px;
}

.status-value {
  font-size:17px;
  font-weight:900;
  color: var(--text-main);
  flex: 1; 
  display: flex;
  align-items: center;
}

input, button {
  width:100%;
  border-radius:6px;
  padding: 8px; /* 버튼/입력창 높이 축소 */
  margin-top: 4px;
  font-size: 13px;
}

input { background: #f0f0f0; border: 1px solid var(--line-color); }
button { font-weight:800; color:white; border:none; }

.btn-fuel, .btn-robot, .btn-carwash, .btn-hair { background: var(--primary); }

.reminder-card {
  grid-column: span 2;
  padding-top: 8px;
  padding-bottom: 8px;
  border-top: 5px solid var(--accent-red);
}

.car-rotation-card {
  grid-column: span 2;
  padding: 8px 12px;
}

.car-btn-container { display: flex; width: 100%; gap: 6px; margin-top: 4px; }

.car-mark {
  flex: 1;
  padding: 8px;
  border-radius: 8px;
  font-weight: 900;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.todo-input-group { display: flex; width: 100%; gap: 6px; margin-top: 4px; }
.todo-input-group input { flex: 1; text-align: left; background: #fff; }
.todo-input-group button { width: auto; min-width: 50px; background-color: var(--accent-red); }
  
.todo-list {
  margin-top: 4px;
  max-height: 105px; /* 리스트 높이 살짝 더 축소 */
  overflow-y: auto;
  width: 100%;
}

.todo-item {
  display:flex;
  padding: 8px 4px;
  border-bottom: 1px solid var(--line-color);
  gap: 8px;
}

.todo-item span.text { font-size: 12px; }
.todo-item button { width:auto; min-width: 35px; padding: 3px 6px; font-size: 10px; background: #999; }
</style>
</head>

<body>
<div class="app-container" id="main-container">
  <div id="pull-indicator">↻</div>
  
  <h2>OXFORD ARCHIVE</h2>

  <div id="dashboard">
    <div class="card reminder-card">
      <div class="card-title" style="margin-bottom:4px;">📌 REMINDERS</div>
      <div class="todo-input-group">
        <input type="text" id="todo-input" placeholder="새로운 아이디어 입력...">
        <button id="btn-add-todo" onclick="addTodo(this)">추가</button>
      </div>
      <div class="todo-list" id="todo-list"></div>
    </div>

    <div class="card car-rotation-card">
      <div class="card-title">🚦 TODAY'S DRIVE</div>
      <div class="car-btn-container">
        <div id="mark-hyundai" class="car-mark">HYUNDAI</div>
        <div id="mark-mini" class="car-mark">JCW</div>
      </div>
    </div>

    <div class="card stat-card">
      <div class="card-title">🚗 FUEL</div>
      <div class="status-value" id="fuel-status">- / 3회</div>
      <button class="btn-fuel" onclick="recordAction('addFuel', this, '주유 기록')">주유 기록</button>
    </div>

    <div class="card stat-card">
      <div class="card-title">🤖 ROBOT</div>
      <div class="status-value" id="robot-status">- / 2회</div>
      <button class="btn-robot" onclick="recordAction('addRobot', this, '청소 기록')">청소 기록</button>
    </div>

    <div class="card stat-card">
      <div class="card-title">🫧 CAR WASH</div>
      <div class="status-value" id="carwash-status">-원</div>
      <button class="btn-carwash" onclick="recordCarWash(this)">차감</button>
    </div>

    <div class="card stat-card">
      <div class="card-title">✂️ HAIR CUT</div>
      <div class="status-value" id="hair-status">-</div>
      <div style="position: relative; width: 100%; margin-top: 6px;">
        <button class="btn-hair" id="btn-hair" style="width: 100%; pointer-events: none;">날짜선택</button>
        <input type="date" id="hairDateVal" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;" onchange="recordHairCut(document.getElementById('btn-hair'))">
      </div>
    </div>
  </div>
</div>

<script>
/* 기존 JavaScript 로직은 동일하게 유지됩니다. */
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzgRQ_fvLToFTWS2IWrJJSf29uBqUzYBbBWpcFyTt8gsk5dDwLMGcHtgx1DZHNifKBfEA/exec'; 

let startY = 0, pullDist = 0;
const threshold = 70;
const pullIndicator = document.getElementById('pull-indicator');
const container = document.getElementById('main-container');

window.addEventListener('touchstart', (e) => {
  if (e.target.closest('#todo-list')) { startY = -1; return; }
  if (window.scrollY === 0) startY = e.touches[0].pageY;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  if (startY === -1) return;
  const currentY = e.touches[0].pageY;
  pullDist = currentY - startY;
  if (pullDist > 0 && window.scrollY === 0) {
    const displayHeight = Math.min(pullDist * 0.4, threshold + 20);
    pullIndicator.style.height = displayHeight + 'px';
  }
}, { passive: true });

window.addEventListener('touchend', (e) => {
  if (startY === -1) { startY = 0; return; }
  if (window.scrollY === 0 && pullDist * 0.4 > threshold) {
    loadAll();
    setTimeout(() => { pullIndicator.style.height = '0px'; }, 800);
  } else {
    pullIndicator.style.height = '0px';
  }
  pullDist = 0;
});

function loadAll() {
  loadData();
  loadTodos();
  updateCarRotation();
}

function updateCarRotation() {
  const today = new Date().getDate();
  const hyundai = document.getElementById('mark-hyundai');
  const mini = document.getElementById('mark-mini');
  hyundai.className = 'car-mark';
  mini.className = 'car-mark';
  if (today % 2 === 0) {
    hyundai.classList.add('hyundai-on'); mini.classList.add('car-off');
  } else {
    mini.classList.add('mini-on'); hyundai.classList.add('car-off');
  }
}

function toggleLoading(btn, isLoading, originalText) {
  btn.disabled = isLoading;
  btn.innerText = isLoading ? '...' : originalText;
}

function getHaircutStatus(dateStr) {
  if (!dateStr) return "기록 없음";
  const cleanDateStr = dateStr.replace(/[.\s]+/g, '-').replace(/-$/, '');
  const targetDate = new Date(cleanDateStr);
  const today = new Date(); today.setHours(0,0,0,0); targetDate.setHours(0,0,0,0);
  const diffDays = Math.floor((today - targetDate) / (1000 * 60 * 60 * 24));
  return `D+${diffDays}<br><span class="small-info">(${Math.floor(diffDays/7)+1}주차)</span>`;
}

function loadData() {
  fetch(`${GAS_URL}?action=getData&_t=${Date.now()}`)
  .then(res => res.json())
  .then(res => {
    if(res.status === 'success') {
      const d = res.data;
      document.getElementById('fuel-status').innerText = d.fuel + " / 3회";
      document.getElementById('robot-status').innerText = d.robot + " / 2회";
      document.getElementById('carwash-status').innerText = (d.carWash || 0).toLocaleString() + "원";
      document.getElementById('hair-status').innerHTML = getHaircutStatus(d.hairCutDate);
    }
  });
}

function recordHairCut(btn){
  const v = document.getElementById('hairDateVal').value;
  if(!v) return;
  toggleLoading(btn, true, '날짜선택');
  fetch(`${GAS_URL}?action=setHairCut&dateVal=${v}`)
  .then(() => { toggleLoading(btn, false, '날짜선택'); loadData(); });
}

function recordAction(action, btn, originalText){
  toggleLoading(btn, true, originalText);
  fetch(`${GAS_URL}?action=${action}`).then(res => res.json()).then(data => {
    toggleLoading(btn, false, originalText);
    if(data.message) alert(data.message);
    loadData();
  });
}

function recordCarWash(btn){
  const amount = prompt("차감할 금액을 입력하세요 (숫자만):");
  if (amount === null || amount.trim() === "") return;
  const v = parseInt(amount.replace(/[^0-9]/g, ''));
  if (isNaN(v) || v <= 0) {
    alert("올바른 금액을 입력해주세요.");
    return;
  }
  toggleLoading(btn, true, '차감');
  fetch(`${GAS_URL}?action=useCarWash&amount=${v}`)
  .then(res => res.json())
  .then(data => {
    toggleLoading(btn, false, '차감');
    if (data.message) alert(data.message);
    loadData();
  });
}

function loadTodos(){
  fetch(`${GAS_URL}?action=getTodos&_t=${Date.now()}`)
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('todo-list');
    list.innerHTML = '';
    const reversedTodos = [...data.todos].map((text, i) => ({ text, originalIndex: i })).reverse();
    reversedTodos.forEach((todo) => {
      const div = document.createElement('div');
      div.className = 'todo-item';
      div.dataset.text = todo.text;
      div.innerHTML = `<span class="drag-handle">☰</span><span class="text">${todo.text}</span><button onclick="deleteTodo(${todo.originalIndex}, this)">삭제</button>`;
      list.appendChild(div);
    });
    new Sortable(list, { handle: '.drag-handle', animation: 150, onEnd: saveOrder });
  });
}

function saveOrder() {
  const listItems = document.querySelectorAll('.todo-item');
  const newOrder = Array.from(listItems).map(item => item.dataset.text).reverse(); 
  const encodedData = encodeURIComponent(JSON.stringify(newOrder));
  fetch(`${GAS_URL}?action=updateTodoOrder&data=${encodedData}`);
}

function addTodo(btn){
  const v = document.getElementById('todo-input').value;
  if(!v) return;
  toggleLoading(btn, true, '추가');
  fetch(`${GAS_URL}?action=addTodo&text=${encodeURIComponent(v)}`)
  .then(() => {
    toggleLoading(btn, false, '추가');
    document.getElementById('todo-input').value = '';
    loadTodos();
  });
}

function deleteTodo(index, btn){
  btn.disabled = true;
  btn.innerText = '...';
  fetch(`${GAS_URL}?action=deleteTodo&index=${index}`).then(() => loadTodos());
}

window.onload = loadAll;
</script>
</body>
</html>
